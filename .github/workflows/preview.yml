name: PR preview link

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post / update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repo = context.payload.pull_request.head.repo.full_name;
            const enc = encodeURIComponent(branch);
            const url = `https://raw.githack.com/${repo}/${enc}/index.html`;

            const marker = '<!-- preview-bot -->';
            const body = [
              marker,
              `### Preview`,
              '',
              `Branch \`${branch}\` rendered live via raw.githack.com:`,
              '',
              `**${url}**`,
              '',
              `<sub>Updates automatically on every push. Static-site preview — reCAPTCHA may warn about origin (UI still renders); don't submit the contact form (Formspree fires live).</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
